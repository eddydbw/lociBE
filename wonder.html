<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Loci — catch a wondering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mansalva&family=Coming+Soon&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   LOCI — VISITOR WONDER PAGE (phone, via QR on the exhibit tablet)
   Pick a big question → the lens asks → catch it with your camera →
   say it in a sentence → it flies to the wall.
   ========================================================================== */
:root{
  --cream:#FFFDF4;--card:#FFFEFB;--ink:#2A2620;--soft:#7A7466;--line:#E9E3D2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);
  min-height:100dvh;overscroll-behavior:none;touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none}
textarea{font-family:'Outfit',sans-serif}
.page{max-width:560px;margin:0 auto;padding:max(22px,4vw) max(20px,4.5vw) 48px;
  display:flex;flex-direction:column;gap:max(18px,4vw)}
.masthead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.wordmark{font-family:'Mansalva',cursive;font-size:clamp(44px,12vw,56px);line-height:1}
.tagline{font-family:'Coming Soon',cursive;color:var(--soft);font-size:clamp(16px,4.4vw,19px)}
.intro{color:var(--soft);font-size:clamp(18px,4.8vw,21px);line-height:1.45}
.intro b{color:var(--ink);font-weight:500}
.steplabel{font-family:'Coming Soon',cursive;color:var(--soft);font-size:clamp(16px,4.4vw,19px)}

/* step 1 — topics */
.topics{display:flex;flex-direction:column;gap:12px}
.topicbtn{display:flex;align-items:center;gap:14px;background:var(--card);
  border:1.5px solid var(--line);border-radius:18px;padding:18px 20px;
  font-size:clamp(20px,5.4vw,23px);color:var(--ink);text-align:left;transition:transform .12s ease}
.topicbtn:active{transform:scale(.97)}
.topicbtn i{width:17px;height:17px;border-radius:50%;flex:none}
.topicbtn.sel{border-color:var(--tc);background:var(--tctint)}

/* step 2 — the prompt */
.hidden{display:none !important}
.promptcard{background:var(--tctint,var(--card));border:1.5px solid var(--tc,var(--line));
  border-radius:22px;padding:22px;display:flex;flex-direction:column;gap:14px}
.promptcard .lens-asks{font-family:'Coming Soon',cursive;color:var(--tcdeep,var(--soft));font-size:clamp(16px,4.4vw,19px)}
.promptcard .prompt{font-size:clamp(26px,7vw,32px);font-weight:500;line-height:1.28}
.reroll{align-self:flex-start;background:none;border:none;color:var(--tcdeep,var(--soft));
  font-family:'Coming Soon',cursive;font-size:clamp(16px,4.4vw,19px);text-decoration:underline dotted;padding:4px 2px}
.btn-camera{display:flex;align-items:center;justify-content:center;gap:12px;
  background:var(--tc);color:var(--ink);font-weight:600;font-size:clamp(20px,5.4vw,23px);
  padding:19px 22px;border-radius:999px;box-shadow:0 10px 24px -12px var(--tc)}
.btn-camera svg{flex:none;width:26px;height:26px}

/* step 3 — the catch */
.preview{border-radius:22px;overflow:hidden;border:1.5px solid var(--line);position:relative}
.preview img{display:block;width:100%;max-height:52dvh;object-fit:cover}
.retake{position:absolute;top:12px;right:12px;background:rgba(255,253,244,.92);
  color:var(--ink);font-size:clamp(16px,4.2vw,18px);padding:10px 18px;border-radius:999px}
#respIn{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:18px;
  padding:16px 18px;font-size:clamp(19px,5vw,22px);color:var(--ink);outline:none;resize:none;line-height:1.4}
#respIn:focus{border-color:var(--tc,#999)}
.btn-send{background:var(--tc);color:var(--ink);font-weight:600;font-size:clamp(21px,5.6vw,24px);
  padding:20px 22px;border-radius:999px;box-shadow:0 10px 24px -12px var(--tc)}
.btn-send:disabled{opacity:.55}
.err{font-family:'Coming Soon',cursive;color:#B0563F;font-size:clamp(16px,4.4vw,19px);text-align:center}

/* sent */
.sent{display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;padding-top:8dvh}
.sent .big{font-family:'Mansalva',cursive;font-size:clamp(38px,10vw,46px);line-height:1.15}
.sent .note{color:var(--soft);font-size:clamp(19px,5vw,22px);line-height:1.5;max-width:30ch}
.sent .dots{display:flex;gap:9px}
.sent .dots i{width:13px;height:13px;border-radius:50%}
.btn-again{background:var(--card);border:1.5px solid var(--tc,var(--line));color:var(--ink);
  font-weight:500;font-size:clamp(19px,5vw,21px);padding:16px 28px;border-radius:999px;margin-top:10px}
</style>
</head>
<body>
<div class="page" id="page"></div>

<script>
/* ============================ DATA — the CMS ============================ */
const DATA = {
  copy:{
    wordmark:"Loci", tagline:"a lens for wondering",
    intro:"Borrow the lens for a minute. <b>Pick a big question, catch a wondering with your camera, and send it to the wall.</b>",
    step1:"1 · pick a big question",
    step2:"2 · the lens asks…",
    step3:"3 · what did you catch?",
    lensAsks:"the lens asks",
    reroll:"ask me another",
    openCamera:"catch it with your camera",
    respPlaceholder:"say it in a sentence…",
    send:"send it to the wall ✳",
    sending:"flying…",
    errSend:"it didn’t quite fly — try again?",
    sentBig:"it’s on its way!",
    sentNote:"Look up — your wondering lands on the wall in a moment.",
    again:"catch another",
  },

  /* the five zine topics; slugs must match the server's TOPIC_SLUGS */
  topics:[
    {name:"Lying",              slug:"lying",          color:"#B7F193"},
    {name:"Why be good?", slug:"invisible-ring", color:"#F1DD93"},
    {name:"Where is beauty?",          slug:"beauty",         color:"#78ABFE"},
    {name:"Is it art?",         slug:"art",            color:"#F19394"},
    {name:"What is Real?",            slug:"real",           color:"#DE93F1"},
  ],

  /* camera prompts per topic, in the lens's voice.
     KEYS ARE THE SLUGS above, not the display names - the code looks
     prompts up by topic.slug. One question per topic keeps it simple;
     add more strings to a list and "ask me another" reappears. */
  prompts:{
    "lying":[
      "Find something that lies",
    ],
    "invisible-ring":[
      "Find a place where the most rules live",
    ],
    "beauty":[
      "Take the most beautiful photo you can without moving around",
    ],
    "art":[
      "Find an accident that looks like it was made",
    ],
    "real":[
      "Find something real that you can't touch",
    ],
  },
};

/* ============================ helpers ============================ */
const CREAM='#FFFDF4', BLACK='#2A2620';
function hexRGB(h){const n=parseInt(h.slice(1),16);return[n>>16,(n>>8)&255,n&255];}
function mix(a,b,t){const A=hexRGB(a),B=hexRGB(b);
  return '#'+A.map((v,i)=>Math.round(v+(B[i]-v)*t).toString(16).padStart(2,'0')).join('');}
const $=id=>document.getElementById(id);
const DEVICE=(location.pathname.match(/\/wonder\/([^\/]+)/)||[])[1]||'demo';
const C=DATA.copy;

let topic=null, prompt='', promptIdx=-1, photoBlob=null;

/* ============================ render ============================ */
function render(){
  $('page').innerHTML=`
    <div class="masthead"><div class="wordmark">${C.wordmark}</div><div class="tagline">${C.tagline}</div></div>
    <div class="intro">${C.intro}</div>
    <div class="steplabel">${C.step1}</div>
    <div class="topics">${DATA.topics.map((t,i)=>
      `<button class="topicbtn" id="top${i}" style="--tc:${t.color};--tctint:${mix(t.color,CREAM,.72)}"
        onclick="pickTopic(${i})"><i style="background:${t.color}"></i>${t.name}</button>`).join('')}</div>
    <div class="hidden" id="step2">
      <div class="steplabel" style="margin-bottom:10px">${C.step2}</div>
      <div class="promptcard" id="pcard">
        <div class="lens-asks">${C.lensAsks}</div>
        <div class="prompt" id="ptext"></div>
        <button class="reroll" id="rerollBtn" onclick="reroll()">${C.reroll}</button>
        <button class="btn-camera" onclick="$('file').click()">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="3"/><circle cx="12" cy="13.5" r="4"/><path d="M9 7l1.2-2.4h3.6L15 7"/></svg>
          ${C.openCamera}</button>
      </div>
    </div>
    <div class="hidden" id="step3">
      <div class="steplabel" style="margin-bottom:10px">${C.step3}</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="preview"><img id="pimg" alt="">
          <button class="retake" onclick="$('file').click()">↺ retake</button></div>
        <textarea id="respIn" rows="2" maxlength="300" placeholder="${C.respPlaceholder}"></textarea>
        <button class="btn-send" id="sendBtn" onclick="send()">${C.send}</button>
        <div class="err hidden" id="err">${C.errSend}</div>
      </div>
    </div>
    <input type="file" id="file" accept="image/*" capture="environment" class="hidden">`;
  $('file').addEventListener('change',onPhoto);
}
render();

function pickTopic(i){
  const t=DATA.topics[i];
  topic=t;promptIdx=-1;
  DATA.topics.forEach((_,j)=>$('top'+j).classList.toggle('sel',j===i));
  const tint=mix(t.color,CREAM,.72), deep=mix(t.color,BLACK,.55);
  const card=$('pcard');
  card.style.setProperty('--tc',t.color);
  card.style.setProperty('--tctint',tint);
  card.style.setProperty('--tcdeep',deep);
  reroll();
  /* one question per topic: no point offering another */
  $('rerollBtn').style.display=DATA.prompts[t.slug].length>1?'':'none';
  $('step2').classList.remove('hidden');
  $('step2').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function reroll(){
  const pool=DATA.prompts[topic.slug];
  promptIdx=(promptIdx+1+Math.floor(Math.random()*(pool.length-1)))%pool.length;
  prompt=pool[promptIdx];
  $('ptext').textContent=prompt;
}

/* downscale on-device so uploads survive show wi-fi */
function onPhoto(){
  const f=$('file').files[0];
  if(!f)return;
  const img=new Image();
  img.onload=()=>{
    const MAX=1600, s=Math.min(1,MAX/Math.max(img.width,img.height));
    const cv=document.createElement('canvas');
    cv.width=Math.round(img.width*s);cv.height=Math.round(img.height*s);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>{
      photoBlob=b;
      $('pimg').src=URL.createObjectURL(b);
      $('step3').classList.remove('hidden');
      $('err').classList.add('hidden');
      $('step3').scrollIntoView({behavior:'smooth',block:'start'});
    },'image/jpeg',.82);
    URL.revokeObjectURL(img.src);
  };
  img.src=URL.createObjectURL(f);
}

async function send(){
  if(!photoBlob||!topic)return;
  const resp=$('respIn').value.trim();
  if(!resp){$('respIn').focus();return;}
  const btn=$('sendBtn');
  btn.disabled=true;btn.textContent=C.sending;
  $('err').classList.add('hidden');
  const fd=new FormData();
  fd.append('photo',photoBlob,'wonder.jpg');
  fd.append('topic',topic.slug);
  fd.append('prompt',prompt);
  fd.append('response',resp);
  fd.append('device_id',DEVICE);
  try{
    const r=await fetch('/api/wonders',{method:'POST',body:fd});
    if(!r.ok)throw 0;
    showSent();
  }catch(e){
    btn.disabled=false;btn.textContent=C.send;
    $('err').classList.remove('hidden');
  }
}

function showSent(){
  $('page').innerHTML=`
    <div class="sent">
      <div class="dots">${DATA.topics.map(t=>`<i style="background:${t.color}"></i>`).join('')}</div>
      <div class="big">${C.sentBig}</div>
      <div class="note">${C.sentNote}</div>
      <button class="btn-again" style="--tc:${topic.color}" onclick="location.reload()">${C.again}</button>
    </div>`;
}
</script>
</body>
</html>
